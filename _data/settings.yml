# Site owner settings
# Customize these values to personalize your mixtape library

owner:
  name: "James"
  email: "jamesbartolotti@gmail.com"
  bio: "I've been collecting tapes since 2023, and I'm always up to swap tapes I've made or found at garage sales. Specializing in Synth-pop, New Wave, and Mid-2000's Indie Rock."
  accepting_requests: true
  
  # Genre preferences for "What I Love" section
  genre_preferences:
    - "Synth-Pop: Thomas Dolby, Human League, Depeche Mode"
    - "New Wave: The Cure, New Order, The Psychedelic Furs"
    - "City Pop: Anri, Mariya Takeuchi, Tatsuro Yamashita"
    - "Alternative: The Strokes, Cake, Electric Six"
    - "Indie: Rock Kills Kid, Sweeping Promises, Dragon Inn 3"
  
  # Tape types you prefer to receive (use values from tape_options.yml)
  preferred_tape_types:
    - "type_i"
    - "type_ii"
  
  # Dolby options you prefer to receive (use values from tape_options.yml)
  preferred_dolby_options:
    - "none"

# Exchange policy
policy:
  description: "I'm happy to copy and exchange tapes with fellow enthusiasts! Please read the guidelines below."
  guidelines:
    - "I'm currently only shipping to the United States"
    - "Allow 2-4 weeks for processing and shipping"
    - "I prefer exchanging a comparable number of tapes instead of purchases. But if you don't have tapes to exchange, I accept a small fee to cover the cost of blanks and shipping (see charges below)"
  
  # Monetary policy for special tape types
  charges:
    type_i: "Free for Type I"
    type_ii: "$2 for Type II per tape (or free for exchanges)"
    type_iv: "Not available"
    shipping: "$5-$10 depending on location and tape quantity with USPS media mail or ground shipping. For exchanges we each cover our own costs."
    payment: "I accept PayPal g+s for tape purchases to cover the cost of blanks and shipping. Don't send any money until I confirm your request! For exchanges, I prefer equivalent swaps with no additional payment on either side."

# Theme customization
theme:
  primary_color: "#e63946"
  secondary_color: "#457b9d"
  background_color: "#f1faee"
  text_color: "#1d3557"
  accent_color: "#a8dadc"
  
  # Optional: header image URL (leave empty for solid color header)
  header_image: ""
  
  # Font choices (Google Fonts or system fonts)
  heading_font: "'Courier New', monospace"
  body_font: "'Helvetica Neue', Arial, sans-serif"

# Site metadata
site:
  show_tape_count: true
  tapes_per_row: 4  # For catalog grid view
  enable_search: true
  enable_filtering: false
